<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<style>
body {
  font-family: "Source Code Pro", monospace;
  background: rgb(236, 230, 216);
}

button, input, select {
  font-family: "Source Code Pro", monospace;
  border: solid 2px;
  box-shadow: 2px 4px 0px;
  margin: 5px;
  padding: 6px 8px;
  background-color: rgb(236, 230, 216);
}

button:hover {
  cursor: pointer;
}

#page-wrapper {
    margin: 0;
}

#navigation_box {
    background-color: #000000;
    display: flex;
    overflow:hidden;
    justify-content: flex-end;
    font-family: 'Source Code Pro', monospace;
    color: #ffffff;
    font-size: 14px;
    padding: 10px;
    padding-right: 20px;
}

.dropdown{
    display:inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0px;
  background-color: #000000;
  color: #ffffff;
  min-width: 160px;
  box-shadow: 8px 12px 0px #000000;
  z-index: 1;
}

.dropdown-content a {
  color: #ffffff;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.dropdown:hover .dropbtn {
  background-color: rgb(72, 60, 32);
}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropdown-content a:hover {
  color: rgb(236, 230, 216);
}

.image-container {
  width: 100%;
  max-width: 600px;
  margin: 5px;
  height: 400px;
}
</style>
<body>
<div class="container">
  <div id="progressBar"><div id="progress"></div></div>

  <h2 id="countdown"></h2>
  <div class="image-container">
    <img id="image">
  </div>

  <div>
    <button onclick="answer('AI')">AI</button>
    <button onclick="answer('Human')">Human</button>
  </div>
  
  <button id="next-btn" class="hidden" onclick="loadNext()">next image →</button>

  <p id="timer"></p>
</div>
<script src="/js/script.js"></script>
    <footer class="footer">
      <div class="footer-container"><h2>:)</h2></div>
    </footer>
  </div> 
</body>
</html>
