<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="page-wrapper">
    <nav id="navigation_box">
      <div id="right_navigation_box">
        <div class="dropdown">
          <button class="dropbtn">menu</button>
          <div class="dropdown-content">
            <a href="index.html">home</a>
            <a href="stuff.html">test</a>
          </div>
        </div>
      </div>
    </nav>
  
    <div class="container">
      <h1>AI vs Human Test</h1>
      <input id="name" placeholder="Enter your name"><br><br>
      <label for="hours">how many hours on social media do you spend per day?</label>
      <select id="hours">
        <option value="">- select -</option>
        <option value="0-1">0–1 hours/day</option>
        <option value="1-3">1–3 hours/day</option>
        <option value="3-5">3–5 hours/day</option>
        <option value="5+">5+ hours/day</option>
      </select>
      <br><br>
      <button id="start-btn" onclick="goNext()" disabled>start</button>
    </div>
  </div>

  <script>
    function goNext() {
      localStorage.setItem("name", document.getElementById("name").value);
      localStorage.setItem("hours", document.getElementById("hours").value);
      window.location.href = "instruct.html";
    }
    const nameInput = document.getElementById("name");
    const hoursInput = document.getElementById("hours");
    const startBtn = document.getElementById("start-btn");

    function checkInputs() {
      if (nameInput.value.trim() !== "" && hoursInput.value !== "") {
        startBtn.disabled = false;
      } else {
        startBtn.disabled = true;
      }
    }

    nameInput.addEventListener("input", checkInputs);
    hoursInput.addEventListener("change", checkInputs);

    function goNext() {
      localStorage.setItem("name", nameInput.value);
      localStorage.setItem("hours", hoursInput.value);
      window.location.href = "instruct.html";
    }
    
    if (localStorage.getItem("testCompleted") === "true") {
      window.location.href = "results.html";
    }
  </script>
</body>
</html>
