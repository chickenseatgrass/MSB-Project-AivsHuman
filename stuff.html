<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<style>
body {
  font-family: "Source Code Pro", monospace;
  background: rgb(236, 230, 216);
}

button, input, select {
  font-family: "Source Code Pro", monospace;
  border: solid 2px;
  box-shadow: 2px 4px 0px;
  margin: 5px;
  padding: 6px 8px;
  background-color: rgb(236, 230, 216);
}

button:hover {
  cursor: pointer;
}

#page-wrapper {
    margin: 0;
}

#navigation_box {
    background-color: #000000;
    display: flex;
    overflow:hidden;
    justify-content: flex-end;
    font-family: 'Source Code Pro', monospace;
    color: #ffffff;
    font-size: 14px;
    padding: 10px;
    padding-right: 20px;
}

.dropdown{
    display:inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0px;
  background-color: #000000;
  color: #ffffff;
  min-width: 160px;
  z-index: 1;
}

.dropdown-content a {
  color: #ffffff;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.dropdown:hover .dropbtn {
  background-color: rgb(72, 60, 32);
}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropdown-content a:hover {
  color: rgb(236, 230, 216);
}

.image-container {
  width: 100%;
  max-width: 600px;
  margin: 5px;
  height: 400px;
}
</style>
<body>
  <div id="page-wrapper">
    <nav id="navigation_box">
      <h1>HIIIII</h1>
      <div id="right_navigation_box">
         <div class="dropdown">
          <button class="dropbtn">menu</button>
          <div class="dropdown-content">
            <a href="index.html">home</a>
            <a href="stuff.html">test</a>
          </div>
        </div>
      </div>
    </nav>
  
    <div class="container">
      <h1>AI vs Human Test</h1>
      <input id="name" placeholder="Enter your name"><br><br>
      <label for="age">Select your age group:</label>
      <select id="age">
        <option value="">- Choose age group -</option>
        <option value="10-12">10-12</option>
        <option value="13-15">13-15</option>
        <option value="16-17">16-17</option>
        <option value="18-20">18-20</option>
        <option value="21-30">21-30</option>
      </select>
      <br><br>
      <button onclick="goNext()">Start</button>
    </div>
  </div>

  <script>
    function goNext() {
      localStorage.setItem("name", document.getElementById("name").value);
      localStorage.setItem("age", document.getElementById("age").value);
      window.location.href = "instruct.html";
    }
  </script>
</body>
</html>
